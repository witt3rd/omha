name: omh
version: "0.1.0"
description: "Oh My Hermes — infrastructure layer for OMH skills (state management, evidence gathering, mode awareness)"
requires_python: ">=3.10"

tools:
  - omh_state
  - omh_gather_evidence

hooks:
  - pre_llm_call
  - on_session_end
  - pre_tool_call

dependencies:
  - pyyaml  # required for config.yaml loading

skills:
  bundled:
    - omh-ralplan
    - omh-ralph
    - omh-deep-interview
    - omh-deep-research
    - omh-autopilot
